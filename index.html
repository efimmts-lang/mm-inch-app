<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MM ⇄ INCH Converter</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">

    <!-- Подключаем внешний CSS -->
   <link rel="stylesheet" href="./css/style.css">
</head>
<body>
<h1>MM ⇄ INCH Converter</h1>

<div class="card">
  <label class="label" for="value">Value</label>
  <input type="text" id="value" placeholder='Enter value (e.g. 25.4 or 1 1/4)' autocomplete="off" />

  <div class="buttons">
    <button class="btn" onclick="mmToInch()">MM → Inch</button>
    <button class="btn" onclick="inchToMm()">Inch → MM</button>
    <button class="btn btn-primary" onclick="autoConvert()">Auto Detect</button>
    <button class="btn btn-ghost" onclick="clearAll()">Clear</button>
  </div>

  <div class="result" id="result" aria-live="polite"></div>
</div>

<script src="./js/app.js"></script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js");
  }
</script>
    

</body>
</html>
